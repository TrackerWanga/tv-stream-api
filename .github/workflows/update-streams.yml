name: Update Streams

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger button

jobs:
  crawl-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout IPTV-API
        uses: actions/checkout@v4
        with:
          repository: Guovin/iptv-api
          path: iptv-api

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install IPTV-API dependencies
        run: |
          cd iptv-api
          pip install pipenv
          pipenv install --deploy

      - name: Run IPTV-API crawl
        run: |
          cd iptv-api
          pipenv run dev

      - name: Checkout TV-API repo
        uses: actions/checkout@v4
        with:
          path: tv-api

      - name: Install sync dependencies
        run: pip install requests

      - name: Parse M3U and sync to KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: |
          python3 tv-api/sync/sync_streams.py \
            --m3u iptv-api/output/result.m3u \
            --epg iptv-api/output/epg/
