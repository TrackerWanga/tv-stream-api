name: Full Stream Pipeline

on:
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          pip install requests
          npm install yt-search
      
      - name: Step 1 - Fetch all IPTV sources
        run: python3 pipeline/fetch_sources.py
      
      - name: Step 2 - Validate all URLs
        run: python3 pipeline/validate_urls.py
      
      - name: Step 3 - YouTube live finder
        run: node pipeline/youtube_finder.js
      
      - name: Step 4 - Merge & organize
        run: python3 pipeline/merge_streams.py
      
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw_streams.json data/streams_live.json data/youtube_streams.json
          git add data/api_streams.json data/api_by_category.json data/api_by_country.json data/api_top100.json data/top_streams.json
          git diff --staged --quiet || git commit -m "Update streams [skip ci]"
          git push
