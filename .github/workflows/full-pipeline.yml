name: Full Stream Pipeline

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          pip install requests
          npm install yt-search
      
      - name: Step 1 - Fetch all IPTV sources
        run: python3 pipeline/fetch_sources.py
      
      - name: Step 2 - Validate all URLs
        run: python3 pipeline/validate_urls.py
      
      - name: Step 3 - YouTube live finder
        run: node pipeline/youtube_finder.js
      
      - name: Step 4 - Merge & organize (IPTV priority)
        run: python3 pipeline/merge_streams.py
      
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add data/
          git diff --staged --quiet || git commit -m "Update streams [skip ci]"
          git push origin main || git push --force origin main

# Add this as a new job (runs in parallel with stream pipeline)
  sports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Fetch sports data
        run: python3 pipeline/fetch_sports.py
      
      - name: Commit sports data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add data/sports.json
          git diff --staged --quiet || git commit -m "Update sports data [skip ci]"
          git push origin main || true
